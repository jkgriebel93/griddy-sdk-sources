  /api/stats/boxscore:
    get:
      description: |
        Retrieves comprehensive boxscore data for a specific game including team statistics,
        individual player statistics, and scoring summary. Returns empty arrays for future games.
      operationId: getStatsBoxscore
      parameters:
      - description: Game identifier (10-digit format YYYYMMDDNN)
        in: query
        name: gameId
        required: true
        schema:
          example: '2025092800'
          pattern: ^\d{10}$
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeamBoxScore'
          description: Successfully retrieved boxscore
        '400':
          description: Invalid game ID
        '401':
          description: Unauthorized
        '404':
          description: Game not found
        '500':
          description: Internal server error
      summary: Get Game Boxscore (Stats API)
      tags:
      - Stats
  /api/stats/game/team-rankings:
    get:
      description: |
        Retrieves comprehensive statistical rankings for both teams in a specific game.
        Returns 300+ statistical categories with rankings for offensive, defensive, and special teams performance.
      operationId: getGameTeamRankings
      parameters:
      - description: Season year
        in: query
        name: season
        required: true
        schema:
          example: 2025
          type: integer
      - description: Type of season
        in: query
        name: seasonType
        required: true
        schema:
          $ref: './nfl-shared.yaml#/components/schemas/SeasonTypeEnum'
      - description: Away team UUID
        in: query
        name: awayTeamId
        required: true
        schema:
          example: 10403000-5851-f9d5-da45-78365a05b6b0
          format: uuid
          type: string
      - description: Home team UUID
        in: query
        name: homeTeamId
        required: true
        schema:
          example: 10403900-8251-6892-d81c-4348525c2d47
          format: uuid
          type: string
      - description: Week number
        in: query
        name: week
        required: true
        schema:
          example: 4
          maximum: 18
          minimum: 1
          type: integer
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeamRankingsResponse'
          description: Successfully retrieved team rankings
        '400':
          description: Invalid parameters
        '401':
          description: Unauthorized
        '500':
          description: Internal server error
      summary: Get Team Rankings for Game
      tags:
      - Stats
  /api/stats/gamecenter:
