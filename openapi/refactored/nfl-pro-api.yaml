openapi: 3.0.3
info:
  title: NFL Pro API
  description: NFL's Pro API for accessing advanced statistics, film room content, player data, and fantasy information. This
    API provides comprehensive access to NFL Pro features including Next Gen Stats, Film Room analysis, player projections,
    and game insights.
  version: 1.0.0
  contact:
    name: NFL
    url: https://www.nfl.com
servers:
- url: https://pro.nfl.com
  description: Production NFL Pro API
security:
- NFLAuth: []
tags:
- description: Game betting odds and lines
  name: Betting
- description: Game previews, film cards, and insights
  name: Content
- description: Editorial insights and analytics content about NFL players and games
  name: Content Insights
- description: Individual defensive player pass rush statistics and analytics
  name: Defensive Pass Rush Statistics
- description: Comprehensive individual defensive player statistics and analytics
  name: Defensive Player Overview
- description: Individual defensive player statistics and coverage analytics
  name: Defensive Statistics
- description: Fantasy football player statistics and scoring metrics
  name: Fantasy Statistics
- description: Advanced play analysis and film study data
  name: Filmroom
- description: Individual player passing statistics and analytics by week
  name: Player Passing Statistics
- description: Individual player receiving statistics and analytics
  name: Player Receiving Statistics
- description: Individual player rushing statistics and analytics
  name: Player Rushing Statistics
- description: Individual player passing statistics and analytics
  name: Player Statistics
- description: Player information, statistics, and projections
  name: Players
- description: Play-by-play data and film room analysis
  name: Plays
- description: Game schedules, matchup rankings, and injury reports
  name: Schedules
- description: Current games, standings, and betting futures
  name: Schedules Extended
- description: Real-time scoring and game status endpoints
  name: Scores
- description: Season weeks and bye information
  name: Season Schedule
- description: Premium coaches film video content with multiple camera angles
  name: Secured Videos
- description: Comprehensive game and team statistics endpoints
  name: Stats
- description: Comprehensive team defensive pass statistics and situational analytics
  name: Team Defense Pass Statistics
- description: Comprehensive team defensive rush statistics and situational analytics
  name: Team Defense Rush Statistics
- description: Comprehensive team defensive statistics and situational analytics
  name: Team Defense Statistics
- description: Comprehensive team offensive overview statistics and situational analytics
  name: Team Offense Overview Statistics
- description: Comprehensive team offensive pass statistics and situational analytics
  name: Team Offense Pass Statistics
- description: Team information, rosters, and schedules
  name: Teams
- description: Game and play-level win probability analytics
  name: Win Probability
paths:
  /api/content/game/preview:
    get:
      description: Retrieves preview content and insights for a specific game based on teams and week. Returns preview information,
        matchup analysis, and key storylines.
      operationId: getGamePreview
      parameters:
      - description: Season year
        in: query
        name: season
        required: true
        schema:
          example: 2025
          type: integer
      - description: Type of season
        in: query
        name: seasonType
        required: true
        schema:
          $ref: './nfl-shared.yaml#/components/schemas/SeasonTypeEnum'
      - description: Week number
        in: query
        name: week
        required: true
        schema:
          example: 4
          type: integer
      - description: Visiting team display name
        in: query
        name: visitorDisplayName
        required: true
        schema:
          example: Minnesota Vikings
          type: string
      - description: Home team display name
        in: query
        name: homeDisplayName
        required: true
        schema:
          example: Pittsburgh Steelers
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GamePreviewResponse'
          description: Successfully retrieved game preview
        '401':
          description: Unauthorized - Invalid or missing authentication token
        '500':
          description: Internal server error
      summary: Get Game Preview Content
      tags:
      - Content
  /api/content/home-film-cards:
    get:
      description: Retrieves featured film room content cards for the home page. Returns weekly playlists and featured player
        film breakdowns.
      operationId: getHomeFilmCards
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HomeFilmCardsResponse'
          description: Successfully retrieved film cards
        '401':
          description: Unauthorized
        '500':
          description: Internal server error
      summary: Get Home Film Cards
      tags:
      - Content
  /api/content/insights/game:
    get:
      description: Retrieves analytical insights and advanced statistics for a specific game. Can filter by tags and exclude
        specific content types.
      operationId: getGameInsights
      parameters:
      - description: Season year
        in: query
        name: season
        required: true
        schema:
          example: 2025
          type: integer
      - description: Maximum number of insights to return
        in: query
        name: limit
        required: false
        schema:
          default: 20
          example: 100
          maximum: 100
          minimum: 1
          type: integer
      - description: Comma-separated list of tags to filter by
        in: query
        name: tags
        required: false
        schema:
          example: pro-preview
          type: string
      - description: Comma-separated list of tags to exclude
        in: query
        name: excludeTags
        required: false
        schema:
          example: betting
          type: string
      - description: FAPI Game identifier (UUID)
        in: query
        name: fapiGameId
        required: true
        schema:
          example: f688dfde-311e-11f0-b670-ae1250fadad1
          format: uuid
          type: string
      - description: Away team identifier
        in: query
        name: awayTeamId
        required: true
        schema:
          example: '3000'
          type: string
      - description: Home team identifier
        in: query
        name: homeTeamId
        required: true
        schema:
          example: '3900'
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/GameInsight'
                type: array
          description: Successfully retrieved game insights
        '401':
          description: Unauthorized
        '500':
          description: Internal server error
      summary: Get Game-Specific Insights
      tags:
      - Content
  /api/content/insights/season:
    get:
      description: |
        Retrieves curated editorial insights and analytics content for NFL players during
        a specified season. Returns expert commentary combining Next Gen Stats data with
        editorial analysis, including pregame previews, postgame breakdowns, fantasy insights,
        and evergreen content. Supports filtering by player, team, content tags, and publication
        limits for targeted content discovery.
      operationId: getSeasonContentInsights
      parameters:
      - description: Season year
        in: query
        name: season
        required: true
        schema:
          example: 2025
          type: integer
      - description: Maximum number of insights to return
        in: query
        name: limit
        required: false
        schema:
          default: 20
          example: 60
          maximum: 100
          minimum: 1
          type: integer
      - description: Content tags to filter by (supports multiple comma-separated tags)
        explode: true
        in: query
        name: tags
        required: false
        schema:
          example:
          - nfl-pro
          items:
            enum:
            - nfl-pro
            - editorial
            - next-gen-stats
            - pregame
            - postgame
            - fantasy
            - pro-preview
            - pro-matchup
            - evergreen
            type: string
          type: array
        style: form
      - description: Filter by specific team identifier
        in: query
        name: teamId
        required: false
        schema:
          example: '3900'
          type: string
      - description: Filter by specific player NFL identifier
        in: query
        name: nflId
        required: false
        schema:
          example: '46101'
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/Insight'
                type: array
          description: Successfully retrieved insights
        '400':
          description: Invalid request parameters
        '401':
          description: Unauthorized
        '500':
          description: Internal server error
      summary: Get Season Content Insights
      tags:
      - Content Insights
  /api/players/player:
    get:
      description: |
        Retrieves detailed information about a specific NFL player including physical attributes,
        team information, draft details, and current status.
      operationId: getPlayer
      parameters:
      - description: NFL player identifier
        in: query
        name: nflId
        required: true
        schema:
          example: 54517
          type: integer
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: './nfl-shared.yaml#/components/schemas/PlayerDetail'
          description: Successfully retrieved player details
        '400':
          description: Invalid request parameters
        '401':
          description: Unauthorized - Invalid or missing authentication token
        '404':
          description: Player not found
        '500':
          description: Internal server error
      summary: Get Player Details
      tags:
      - Players
  /api/players/projectedStats:
    get:
      description: |
        Retrieves projected fantasy statistics for players based on team, season, and week.
        Returns data in JSON:API format with relationships between players and their projected stats.
      operationId: getProjectedStats
      parameters:
      - description: Filter by NFL team ID (UUID format)
        in: query
        name: filter[nflTeamId]
        required: false
        schema:
          example: 10403000-5851-f9d5-da45-78365a05b6b0
          format: uuid
          type: string
      - description: Season year
        in: query
        name: season
        required: true
        schema:
          example: 2025
          type: integer
      - description: Week number within the season
        in: query
        name: week
        required: true
        schema:
          example: 4
          maximum: 18
          minimum: 1
          type: integer
      - description: Number of results per page
        in: query
        name: page[size]
        required: false
        schema:
          default: 20
          maximum: 100
          minimum: 1
          type: integer
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectedStatsResponse'
          description: Successfully retrieved projected statistics
        '400':
          description: Invalid request parameters
        '401':
          description: Unauthorized
        '500':
          description: Internal server error
      summary: Get Projected Player Statistics
      tags:
      - Players
  /api/players/search:
    get:
      description: |
        Searches for NFL players by name or term. Returns a list of players matching the search criteria
        including both active and retired players.
      operationId: searchPlayers
      parameters:
      - description: Search term for player name (first or last name)
        in: query
        name: term
        required: true
        schema:
          example: Pickens
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlayerSearchResponse'
          description: Successfully retrieved search results
        '400':
          description: Invalid request parameters
        '401':
          description: Unauthorized
        '500':
          description: Internal server error
      summary: Search Players
      tags:
      - Players
  /api/plays/summaryPlay:
    get:
      description: |
        Retrieves detailed information about a specific play in a game including play description,
        statistics, involved players, win probability, and expected points.
      operationId: getSummaryPlay
      parameters:
      - description: Game identifier (UUID format)
        in: query
        name: gameId
        required: true
        schema:
          example: f665fc10-311e-11f0-b670-ae1250fadad1
          format: uuid
          type: string
      - description: Play identifier within the game
        in: query
        name: playId
        required: true
        schema:
          example: 40
          type: integer
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlaySummaryResponse'
          description: Successfully retrieved play summary
        '400':
          description: Invalid request parameters
        '401':
          description: Unauthorized
        '404':
          description: Play not found
        '500':
          description: Internal server error
      summary: Get Play Summary
      tags:
      - Plays
  /api/schedules/current:
    get:
      description: |
        Retrieves all games for the current week of the NFL season.
        Returns comprehensive game data including teams, venues, broadcast information,
        scores (for completed games), and ticket details. The endpoint automatically
        determines the current week based on the current date.
      operationId: getCurrentWeekGames
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CurrentGamesResponse'
          description: Successfully retrieved current week games
        '401':
          description: Unauthorized - Invalid or missing authentication token
        '500':
          description: Internal server error
      summary: Get Current Week Games
      tags:
      - Schedules Extended
  /api/schedules/game:
    get:
      description: |
        Retrieves detailed information for a specific game by its ID.
        Returns comprehensive game data including teams, score, venue, broadcast information,
        and current game status.
      operationId: getScheduledGame
      parameters:
      - description: Game identifier (UUID format)
        in: query
        name: gameId
        required: true
        schema:
          example: f665fc10-311e-11f0-b670-ae1250fadad1
          format: uuid
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GameDetail'
          description: Successfully retrieved game details
        '400':
          description: Invalid game ID
        '401':
          description: Unauthorized
        '404':
          description: Game not found
        '500':
          description: Internal server error
      summary: Get Single Game Details
      tags:
      - Schedules
  /api/schedules/game/matchup/rankings:
    get:
      description: |
        Retrieves comprehensive matchup rankings and statistical comparisons for both teams in a specific game.
        Returns offensive, defensive, and special teams rankings with Z-scores and advantage ratings
        for various statistical categories.
      operationId: getGameMatchupRankings
      parameters:
      - description: Game identifier (10-digit format YYYYMMDDNN)
        in: query
        name: gameId
        required: true
        schema:
          example: '2025092500'
          pattern: ^\d{10}$
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MatchupRankingsResponse'
          description: Successfully retrieved matchup rankings
        '400':
          description: Invalid game ID
        '401':
          description: Unauthorized
        '404':
          description: Game not found
        '500':
          description: Internal server error
      summary: Get Game Matchup Rankings
      tags:
      - Schedules
  /api/schedules/game/team/injuries:
    get:
      description: |
        Retrieves injury report information for a specific team in a given week.
        Returns player injury status and details for the specified team and week.
      operationId: getTeamInjuries
      parameters:
      - description: Season year
        in: query
        name: season
        required: true
        schema:
          example: 2025
          type: integer
      - description: Type of season
        in: query
        name: seasonType
        required: true
        schema:
          $ref: './nfl-shared.yaml#/components/schemas/SeasonTypeEnum'
      - description: Team identifier (UUID format)
        in: query
        name: teamId
        required: true
        schema:
          example: 10403000-5851-f9d5-da45-78365a05b6b0
          format: uuid
          type: string
      - description: Week number within the season
        in: query
        name: week
        required: true
        schema:
          example: 4
          maximum: 18
          minimum: 1
          type: integer
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: './nfl-shared.yaml#/components/schemas/InjuryReportResponse'
          description: Successfully retrieved injury report
        '400':
          description: Invalid request parameters
        '401':
          description: Unauthorized
        '404':
          description: Team not found
        '500':
          description: Internal server error
      summary: Get Team Injuries for Game Week
      tags:
      - Schedules
  /api/schedules/games:
    get:
      description: |
        Retrieves all games for a specific season, season type, and week.
        Returns comprehensive game data including teams, venues, broadcast information,
        and ticket details for all games in the specified week.
      operationId: getScheduledGames
      parameters:
      - description: Season year
        in: query
        name: season
        required: true
        schema:
          example: 2025
          type: integer
      - description: Type of season
        in: query
        name: seasonType
        required: true
        schema:
          $ref: './nfl-shared.yaml#/components/schemas/SeasonTypeEnum'
      - description: Week number within the season
        in: query
        name: week
        required: true
        schema:
          example: 3
          maximum: 18
          minimum: 1
          type: integer
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GamesResponse'
          description: Successfully retrieved games
        '400':
          description: Invalid request parameters
        '401':
          description: Unauthorized - Invalid or missing authentication token
        '500':
          description: Internal server error
      summary: Get Games by Week
      tags:
      - Schedules
  /api/schedules/genius/future/odds:
    get:
      description: |
        Retrieves comprehensive betting futures data including Super Bowl odds,
        conference championship odds, and division winner odds for all teams.
        Returns decimal odds for each selection along with availability status.
        This endpoint provides futures market data across multiple betting hierarchies.
      operationId: getFutureBettingOdds
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FuturesOddsResponse'
          description: Successfully retrieved betting futures
        '401':
          description: Unauthorized
        '500':
          description: Internal server error
      summary: Get Future Betting Odds
      tags:
      - Schedules Extended
  /api/schedules/standings:
    get:
      description: |
        Retrieves comprehensive team standings for a specific season, season type, and week.
        Returns detailed standings information including division, conference, home/away records,
        win percentages, points for/against, current streaks, and clinching scenarios.
        Standings are calculated through the specified week.
      operationId: getTeamStandings
      parameters:
      - description: Season year
        in: query
        name: season
        required: true
        schema:
          example: 2025
          type: integer
      - description: Type of season
        in: query
        name: seasonType
        required: true
        schema:
          $ref: './nfl-shared.yaml#/components/schemas/SeasonTypeEnum'
      - description: Week number within the season
        in: query
        name: week
        required: true
        schema:
          example: 4
          maximum: 18
          minimum: 1
          type: integer
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: './nfl-shared.yaml#/components/schemas/StandingsResponse'
          description: Successfully retrieved standings
        '400':
          description: Invalid request parameters
        '401':
          description: Unauthorized
        '500':
          description: Internal server error
      summary: Get Team Standings
      tags:
      - Schedules Extended
  /api/schedules/week/odds:
    get:
      description: |
        Retrieves comprehensive betting odds for all games in a specified week.
        Returns point spreads, money lines, and totals (over/under) for each game
        with the latest odds updates from betting markets.
      operationId: getWeeklyBettingOdds
      parameters:
      - description: Season year
        in: query
        name: season
        required: true
        schema:
          example: 2025
          type: integer
      - description: Type of season
        in: query
        name: seasonType
        required: true
        schema:
          $ref: './nfl-shared.yaml#/components/schemas/SeasonTypeEnum'
      - description: Week number within the season
        in: query
        name: week
        required: true
        schema:
          example: 4
          maximum: 18
          minimum: 1
          type: integer
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WeeklyOddsResponse'
          description: Successfully retrieved betting odds
        '400':
          description: Invalid request parameters
        '401':
          description: Unauthorized - Invalid or missing authentication token
        '500':
          description: Internal server error
      summary: Get Weekly Betting Odds
      tags:
      - Betting
  /api/schedules/weeks:
    get:
      description: Retrieves all weeks for a specific season including preseason, regular season, and postseason weeks. Returns
        week dates, types, and teams on bye for each week. This endpoint provides a comprehensive season calendar with all
        scheduling information.
      operationId: getScheduleSeasonWeeks
      parameters:
      - description: Season year
        in: query
        name: season
        required: true
        schema:
          example: 2025
          type: integer
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SeasonWeeksResponse'
          description: Successfully retrieved season weeks
        '400':
          description: Invalid season parameter
        '401':
          description: Unauthorized
        '500':
          description: Internal server error
      summary: Get Season Weeks
      tags:
      - Season Schedule
  /api/scores/live/games:
    get:
      description: |
        Retrieves real-time scores and game status for all games in a specified week.
        This endpoint updates frequently (15-second cache) to provide live scoring updates
        during active games. Returns an empty array when no games are currently being played.
      operationId: getLiveGameScores
      parameters:
      - description: Season year
        in: query
        name: season
        required: true
        schema:
          example: 2025
          type: integer
      - description: Type of season
        in: query
        name: seasonType
        required: true
        schema:
          $ref: './nfl-shared.yaml#/components/schemas/SeasonTypeEnum'
      - description: Week number
        in: query
        name: week
        required: true
        schema:
          example: 4
          maximum: 18
          minimum: 1
          type: integer
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LiveScoresResponse'
          description: Successfully retrieved live scores
        '400':
          description: Invalid parameters
        '401':
          description: Unauthorized
        '500':
          description: Internal server error
      summary: Get Live Game Scores
      tags:
      - Scores
  /api/secured/plays/winProbability:
    get:
      description: |
        Retrieves comprehensive win probability data for every play in specified games.
        Returns pre-game win probabilities and detailed play-by-play probability changes,
        including Win Probability Added (WPA) metrics for each play. This advanced analytics
        endpoint tracks how each play impacts the probability of each team winning the game.
        Supports querying multiple games simultaneously.
      operationId: getPlaysWinProbability
      parameters:
      - description: 'Game identifier(s) in 10-digit format (YYYYMMDDNN). Can be a single game ID or multiple game IDs for
          batch retrieval. '
        examples:
          multiple:
            summary: Multiple games
            value:
            - '2025092800'
            - '2025092104'
          single:
            summary: Single game
            value: '2025092800'
        in: query
        name: gameId
        required: true
        schema:
          oneOf:
          - pattern: ^\d{10}$
            type: string
          - items:
              pattern: ^\d{10}$
              type: string
            type: array
      responses:
        '200':
          content:
            application/json:
              schema:
                oneOf:
                - $ref: '#/components/schemas/WinProbabilityResponse'
                - items:
                    $ref: '#/components/schemas/WinProbabilityResponse'
                  type: array
          description: Successfully retrieved win probability data
        '400':
          description: Invalid game ID format
        '401':
          description: Unauthorized - Invalid or missing authentication token
        '403':
          description: Forbidden - Insufficient permissions to access secured endpoint
        '404':
          description: Game not found
        '500':
          description: Internal server error
      summary: Get Game Win Probability by Plays
      tags:
      - Win Probability
  /api/secured/plays/winProbabilityMin:
    get:
      description: |
        Retrieves minimal win probability data for specified games, including pregame
        win probabilities and play-by-play probability changes throughout the game.
        This endpoint provides essential win probability metrics with optimized data
        structure for performance. Supports multiple games in a single request.
      operationId: getWinProbabilityMin
      parameters:
      - description: |
          Football API game identifiers (UUID format). Supports multiple game IDs
          to retrieve win probability data for multiple games simultaneously.
        example:
        - f666051f-311e-11f0-b670-ae1250fadad1
        - f6660056-311e-11f0-b670-ae1250fadad1
        - f665fc10-311e-11f0-b670-ae1250fadad1
        explode: true
        in: query
        name: fapiGameId
        required: true
        schema:
          items:
            format: uuid
            type: string
          maxItems: 50
          minItems: 1
          type: array
        style: form
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WinProbabilityResponse'
          description: Successfully retrieved win probability data
        '400':
          description: Invalid request parameters
        '401':
          description: Unauthorized - Invalid or missing authentication token
        '403':
          description: Forbidden - Insufficient permissions for secured content
        '404':
          description: Game(s) not found
        '500':
          description: Internal server error
      summary: Get Minimal Win Probability Data
      tags:
      - Win Probability
  /api/secured/stats/defense/nearest/season:
    get:
      description: Retrieves comprehensive defensive statistics for NFL players during a specified season. Returns detailed
        coverage metrics including targets allowed, completion rates, pass rating allowed, yards after catch prevention, and
        advanced Next Gen Stats data. Supports filtering by qualified defenders, teams, and various sorting options. Data
        includes traditional defensive stats and advanced analytics like EPA (Expected Points Added), CROE (Completion Rate
        Over Expected), receiver separation allowed, and coverage snap counts.
      operationId: getDefensiveStatsBySeason
      parameters:
      - description: Season year
        in: query
        name: season
        required: true
        schema:
          example: 2025
          type: integer
      - description: Type of season
        in: query
        name: seasonType
        required: true
        schema:
          $ref: './nfl-shared.yaml#/components/schemas/SeasonTypeEnum'
      - description: Maximum number of players to return
        in: query
        name: limit
